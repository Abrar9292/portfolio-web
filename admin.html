<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2 class="mt-4 text-center"> Contact Messages</h2>

    <div id="data"></div>
</div>

<script>
    fetch("http://localhost:9191/api/contact/all")
    .then(res => res.json())
    .then(list => {

        let html = "";

        list.forEach(c => {
            html += `
            <div class="card p-3">
                <h5>${c.name}</h5>
                <p><b>Email:</b> ${c.email}</p>
                <p>${c.message}</p>
            </div>
            `;
        });

        document.getElementById("data").innerHTML = html;
    });
</script>

</body>
</html>
