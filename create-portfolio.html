<!DOCTYPE html>
<html>
<head>
    <title>Create Portfolio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f0f2f5;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="container mt-5 d-flex justify-content-center">

    <div class="card p-4 shadow" style="width: 500px;">
        <h3 class="text-center">Create Portfolio</h3>

        <input id="name" class="form-control mb-2" placeholder="Your Name">
        <textarea id="bio" class="form-control mb-2" placeholder="Bio"></textarea>
        <input id="skills" class="form-control mb-2" placeholder="Skills">
        <input id="projects" class="form-control mb-2" placeholder="Projects">
        <input id="username" class="form-control mb-3" placeholder="Username (URL name)">

        <button class="btn btn-primary w-100" onclick="createPortfolio()">Create</button>
    </div>

</div>

<script>
    function createPortfolio() {

        const data = {
            name: document.getElementById("name").value,
            bio: document.getElementById("bio").value,
            skills: document.getElementById("skills").value,
            projects: document.getElementById("projects").value,
            username: document.getElementById("username").value
        };

        fetch("http://localhost:9191/api/portfolio/create", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(res => res.text())
        .then(msg => {
            alert(msg);

            if(msg === "Portfolio Created Successfully"){
                window.location.href = "view.html?username=" + data.username;
            }
        });
    }
</script>

</body>
</html>
