<!DOCTYPE html>
<html>
<head>
    <title>Abrar Portfolio</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #dfe9f3, #ffffff);
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar {
            background: white;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .hero-wrapper {
            padding: 100px 20px;
        }

        .hero-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .hero-title {
            font-size: 40px;
            font-weight: bold;
        }

        .hero-text {
            margin-top: 15px;
            color: gray;
        }

        .hero-img {
            width: 300px;
            border-radius: 20px;
        }

        .tag {
            position: absolute;
            background: white;
            padding: 5px 12px;
            border-radius: 20px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            font-size: 12px;
        }

        .tag1 { top: 20%; left: 10%; }
        .tag2 { top: 50%; right: 10%; }
        .tag3 { bottom: 10%; left: 30%; }

        .stats span {
            margin-right: 20px;
            font-weight: bold;
        }

        .section {
            padding: 80px 20px;
            text-align: center;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        #contact {
            background: #f8f9fa;
        }

        .footer {
            background: black;
            color: white;
            padding: 20px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="#">Abrar Website</a>

        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
            <li class="nav-item"><a class="nav-link" href="#portfolio">Portfolio</a></li>
            <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
        </ul>
    </div>
</nav>

<!-- HERO -->
<div class="hero-wrapper">
    <div class="hero-card container">
        <div class="row align-items-center">

            <div class="col-md-6">
                <h1 class="hero-title">Lets Work Together </h1>

                <p class="hero-text">
                    Create a professional portfolio website in minutes.
                </p>

                <div class="stats mt-4">
                    <span>15+ Projects</span>
                    <span>26K Users</span>
                    <span>98% Success</span>
                </div>
            </div>

            <div class="col-md-6 text-center">
                <img src="images/hero.jpg" class="hero-img">
            </div>

        </div>
    </div>
</div>

<!-- ABOUT -->
<div id="about" class="section">
    <h2>About Platform</h2>
    <p>We help you create modern portfolios easily.</p>
</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="section">
    <h2>Sample Portfolios</h2>
</div>

<!-- CONTACT -->
<div id="contact" class="section">
    <h2>Contact Us</h2>

    <div class="container mt-4">
        <div class="row justify-content-center">

            <div class="col-md-6">
                <form onsubmit="sendMessage(event)">

                    <input type="text" id="name" class="form-control mb-3" placeholder="Your Name">

                    <input type="email" id="email" class="form-control mb-3" placeholder="Your Email">

                    <textarea id="message" class="form-control mb-3" rows="4" placeholder="Your Message"></textarea>

                    <button class="btn btn-primary w-100">Send Message</button>

                </form>
            </div>

        </div>
    </div>
</div>

<!-- FOOTER -->
<div class="footer text-center">
    <p>© 2026 Abrar</p>
</div>

<!-- JAVASCRIPT -->
<script>
    function sendMessage(event) {
        event.preventDefault();

        let data = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            message: document.getElementById("message").value
        };

        fetch("https://your-backend-url.com/api/contact/save", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(res => res.text())
        .then(msg => {
            alert(msg);
            document.querySelector("form").reset();
        })
        .catch(err => {
            console.log(err);
            alert("Error sending message!");
        });
    }
</script>

</body>
</html>
